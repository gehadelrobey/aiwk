version: 2

project_name: aiwk

before:
  hooks:
    - go mod tidy

builds:
  - id: aiwk
    main: ./cmd/aiwk
    binary: aiwk
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}

archives:
  - id: tarball
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else if eq .Arch "386" }}i386{{ else }}{{ .Arch }}{{ end }}
      {{- with .Arm }}v{{ . }}{{ end }}
      {{- with .Mips }}_{{ . }}{{ end }}

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  disable: true

brews:
  - name: aiwk
    repository:
      owner: gehadelrobey
      name: homebrew-aiwk
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_msg_template: "Brew formula update for {{ .ProjectName }} {{ .Tag }}"
    directory: Formula
    homepage: "https://github.com/gehadelrobey/aiwk"
    description: "Plain English text processing for the Unix pipeline"
    license: MIT
    install: |
      bin.install "aiwk"
    test: |
      output = shell_output("#{bin}/aiwk --help")
      assert_match "aiwk", output
    ids:
      - tarball
